plugins {
    id 'java'
    id 'java-library'
    id 'maven-publish'
    alias libs.plugins.modDevGradle
    alias libs.plugins.lombok
}

group = project.properties.maven_group
version = project.properties.mod_version

java {
    toolchain.languageVersion = JavaLanguageVersion.of(17)
    withSourcesJar()
}

base {
    archivesName = "${project.name}-${libs.versions.minecraft.get()}"
}

sourceSets {
    main.resources {
        srcDir 'src/generated/resources'
    }
}

legacyForge {
    version = libs.versions.minecraft.get() + '-' + libs.versions.forge.get()

    parchment {
        minecraftVersion = libs.versions.minecraft.get()
        mappingsVersion  = libs.versions.parchment.get()
    }

    mods {
        "${project.properties.mod_id}" {
            sourceSet(sourceSets.main)
        }
    }

    runs {
        client {
            client()
            gameDirectory.set(file('runs/client'))
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            logLevel = org.slf4j.event.Level.INFO
        }
        server {
            server()
            gameDirectory.set(file('runs/server'))
            programArgument '--nogui'
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            logLevel = org.slf4j.event.Level.INFO
        }
        data {
            data()
            gameDirectory.set(file('runs/data'))
            programArguments.addAll('--mod', project.mod_id, '--all',
                '--output', file('src/generated/resources/').absolutePath,
                '--existing', file('src/main/resources/').absolutePath)
            logLevel = org.slf4j.event.Level.INFO
        }
    }
}

repositories {
    mavenCentral()

    exclusiveContent { // Modrinth Maven — gcyr
        forRepository { maven { url = 'https://api.modrinth.com/maven/' } }
        filter { includeGroup('maven.modrinth') }
    }

    exclusiveContent { // LDLib
        forRepository { maven { url = 'https://maven.firstdark.dev/snapshots' } }
        filter { includeGroup('com.lowdragmc.ldlib') }
    }

    exclusiveContent { // Registrate
        forRepository { maven { url = 'https://maven.tterrag.com/' } }
        filter { includeGroup('com.tterrag.registrate') }
    }

    maven { // GTCEu — ldlib, registrate, configuration, and mixinextras are all
            // bundled inside the gtceu jar via JarJar, so this is the only extra repo needed
        name = 'GTCEu Maven'
        url = 'https://maven.gtceu.com'
        content { includeGroup 'com.gregtechceu.gtceu' }
    }
}

dependencies {
    // gcyr: compile + runtime (our direct dependency)
    modImplementation(deps.gcyr) { transitive = false }

    // gtceu: compile + runtime — we use GTAddon/IGTAddon APIs directly; it also
    // bundles ldlib, registrate, configuration, and mixinextras via JarJar
    modImplementation(deps.gtceu) { transitive = false }

    // Needed at compile time when directly subclassing GTCEu/LDLib types.
    compileOnly("com.lowdragmc.ldlib:ldlib-forge-1.20.1:1.0.40.b")
    compileOnly("com.tterrag.registrate:Registrate:MC1.20-1.3.11")
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

jar {
    manifest.attributes([
        'Specification-Title'   : project.name,
        'Specification-Version' : project.properties.mod_version,
        'Implementation-Title'  : base.archivesName.get(),
        'Implementation-Version': project.version,
    ])
}

tasks.matching { it.name.startsWith('prepare') }.configureEach {
    doFirst {
        mkdir('runs/client')
        mkdir('runs/server')
        mkdir('runs/data')
    }
}
